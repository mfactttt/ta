<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Сердечная галерея — твои фото</title>
    <style>
      /* ---------- ГЛОБАЛЬНЫЙ РОЗОВЫЙ ФОН НА ВСЮ СТРАНИЦУ ---------- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Фон на всю страницу — именно розовый, с мягким градиентом для нежности */
      body {
        min-height: 100vh;
        width: 100%;
        background: radial-gradient(circle at 20% 30%, #ffe6f0, #ffd9e8);
        /* дополнительная защита: если градиент не нравится — сплошной розовый */
        background-attachment: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui, "Segoe UI", "Roboto", "Helvetica Neue", sans-serif;
        padding: 20px;
      }

      /* ----- стили для самого контейнера-обертки (контент центрирован) ----- */
      /* wrap уже центрируется через флекс body, но продублируем и внутри страховку */
      .wrap {
        width: 100%;
        max-width: 700px;
        margin: 0 auto;
        background: linear-gradient(
          145deg,
          #fff0f6 0%,
          #ffe4ef 50%,
          #fff6f9 100%
        );
        border-radius: 48px 48px 56px 56px;
        padding: clamp(1.2rem, 5vw, 2.5rem) clamp(1rem, 4vw, 2rem);
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(255, 80, 120, 0.15);
        backdrop-filter: blur(0px);
        transition: all 0.2s;
      }

      /* Остальные стили (анимации, сердечко, фото-кольца) — без изменений, но адаптированы под локальные фото */
      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-14px) rotate(4deg);
        }
      }
      @keyframes heartbeat {
        0%,
        100% {
          transform: scale(1);
        }
        25% {
          transform: scale(1.15);
        }
        50% {
          transform: scale(1.05);
        }
        75% {
          transform: scale(1.2);
        }
      }
      @keyframes pulse-ring {
        0% {
          transform: scale(0.8);
          opacity: 1;
        }
        100% {
          transform: scale(2.4);
          opacity: 0;
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      @keyframes glowPulse {
        0%,
        100% {
          box-shadow: 0 0 16px rgba(255, 100, 150, 0.4);
        }
        50% {
          box-shadow:
            0 0 48px rgba(255, 100, 150, 0.8),
            0 0 80px rgba(255, 160, 200, 0.4);
        }
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.5) rotate(-4deg);
        }
        65% {
          transform: scale(1.07) rotate(1deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }
      @keyframes petalFall {
        0% {
          transform: translateY(-30px) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(130vh) rotate(720deg);
          opacity: 0;
        }
      }
      @keyframes sparkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes photoFloat {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .petal {
        position: fixed;
        pointer-events: none;
        animation: petalFall linear forwards;
        z-index: 9999;
      }
      .sdot {
        position: absolute;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ff6b9d;
        animation: sparkle 1.6s ease-in-out infinite;
        z-index: 20;
      }
      .deco {
        position: absolute;
        pointer-events: none;
        opacity: 0.18;
        animation: float ease-in-out infinite;
      }
      .orbit-area {
        position: relative;
        width: min(90vw, 420px);
        height: min(90vw, 420px);
        margin: 0 auto clamp(1rem, 3vw, 1.6rem);
        flex-shrink: 0;
      }
      .photo-slot {
        position: absolute;
        border-radius: 50%;
        overflow: hidden;
        border: 3px solid white;
        box-shadow: 0 4px 18px rgba(255, 80, 140, 0.35);
        background: linear-gradient(135deg, #ffcce0, #ffaacb);
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s;
        cursor: pointer;
        backdrop-filter: blur(0px);
      }
      .photo-slot:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 22px rgba(255, 60, 110, 0.5);
      }
      .photo-slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      /* заглушка эмодзи, пока нет фото */
      .photo-slot span {
        font-size: 1.5rem;
        font-weight: normal;
        opacity: 0.8;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }

      .heart-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 15;
      }
      .ring-pulse {
        position: absolute;
        border-radius: 50%;
        border: 2px solid rgba(255, 100, 150, 0.5);
        pointer-events: none;
      }
      .hbtn {
        width: clamp(80px, 22vw, 104px);
        height: clamp(80px, 22vw, 104px);
        border-radius: 50%;
        background: linear-gradient(135deg, #ff6b9d, #ff3d7f);
        border: none;
        cursor: pointer;
        font-size: clamp(34px, 9vw, 46px);
        line-height: 1;
        animation:
          heartbeat 2.5s ease-in-out infinite,
          glowPulse 2.5s ease-in-out infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 16;
        transition: transform 0.12s;
        -webkit-tap-highlight-color: transparent;
        color: white;
        box-shadow: 0 6px 16px rgba(255, 50, 100, 0.4);
      }
      .hbtn:active {
        transform: scale(0.91) !important;
      }

      .sublabel {
        font-size: clamp(11px, 2.5vw, 13px);
        color: #d4547e;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin: 0 0 0.3rem;
        font-weight: 500;
        opacity: 0.85;
        text-align: center;
      }
      .title {
        font-size: clamp(16px, 4.5vw, 24px);
        font-weight: 600;
        color: #c0396a;
        margin: 0 0 1rem;
        text-align: center;
        background: linear-gradient(90deg, #c0396a, #e8608a, #c0396a);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s linear infinite;
      }
      .card {
        display: none;
        max-width: min(400px, 92vw);
        width: 100%;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(2px);
        border-radius: 34px;
        padding: clamp(1rem, 3.5vw, 1.6rem) clamp(1rem, 4vw, 1.8rem);
        border: 1px solid rgba(255, 150, 190, 0.5);
        box-shadow: 0 12px 32px rgba(255, 100, 150, 0.18);
        text-align: center;
        margin-bottom: 0.6rem;
      }
      .cemoji {
        font-size: clamp(26px, 7vw, 36px);
        margin-bottom: 0.5rem;
      }
      .ctext {
        font-size: clamp(13px, 3.5vw, 16px);
        color: #b32e5e;
        line-height: 1.75;
        margin: 0 0 0.8rem;
        font-weight: 500;
      }
      .cline {
        width: 42px;
        height: 2.5px;
        background: linear-gradient(90deg, #ff6b9d, #ffb3d1);
        margin: 0 auto;
        border-radius: 4px;
      }
      .counter {
        margin-top: 0.6rem;
        margin-bottom: 0.3rem;
        font-size: clamp(11px, 3vw, 13px);
        color: #d4547e;
        opacity: 0.72;
        display: none;
        text-align: center;
      }

      /* адаптация для маленьких экранов */
      @media (max-width: 480px) {
        .wrap {
          padding: 1.2rem 1rem;
          border-radius: 36px;
        }
      }
    </style>
  </head>
  <body>
    <div id="petals"></div>

        <!-- ========= ВНУТРЕННЕЕ КОЛЬЦО (5 фото) ========= -->

        <div class="photo-slot" id="i1"><span>📸</span></div>

        <!-- сердечко -->
        <div class="heart-center">
          <div
            style="
              position: relative;
              display: flex;
              align-items: center;
              justify-content: center;
            "
          >
            <div
              class="ring-pulse"
              style="
                width: clamp(76px, 21vw, 96px);

                animation: pulse-ring 2s ease-out infinite;
              "
            ></div>
            <div
              class="ring-pulse"
              style="
                width: clamp(76px, 21vw, 96px);

              "
            ></div>
            <div class="sdot" style="top: -3px; left: 20%"></div>

              "

            <div
              class="sdot"

            <button
              class="hbtn"
              onclick="showCompliment()"
              onmousedown="this.style.transform = 'scale(0.91)'"

      </div>

      <div class="card" id="card">
        <div class="cemoji" id="cemoji"></div>

        <div class="cline"></div>
      </div>
      <p class="counter" id="counter">уже <span id="cnum">1</span> раз ❤️</p>
    </div>

    <script>
      // ---------- КОМПЛИМЕНТЫ ----------
      const compliments = [
        {
          e: "🌸",
          t: "Ты светишь ярче всех звёзд. Когда ты улыбаешься, весь мир становится теплее.",
        },
        {
          e: "✨",
          t: "Твои глаза — это отдельная вселенная, в которой я хочу потеряться навсегда.",
        },
        {
          e: "🌹",
          t: "Ты красивее самого красивого рассвета. Я бы смотрел на тебя бесконечно.",
        },
        {
          e: "💫",
          t: "Рядом с тобой я понимаю, что значит быть по-настоящему счастливым. Ты моё всё.",
        },
        {
          e: "🌺",
          t: "Ты умнее, нежнее и добрее, чем можешь себе представить. Я так горжусь тобой.",
        },
        {
          e: "💝",
          t: "Твой смех — это лучшая музыка в мире. Я бы слушал её каждый день.",
        },
        {
          e: "🦋",
          t: "Ты особенная. Именно та, о которой мечтают, но встречают одну на миллион.",
        },
        {
          e: "🌙",
          t: "Даже в самый трудный день ты остаёшься изящной и сильной. Ты моё вдохновение.",
        },
        {
          e: "💖",
          t: "Мир без тебя был бы скучным и серым. Ты добавляешь в него цвет, тепло и смысл.",
        },
        {
          e: "🌟",
          t: "Я не верил в любовь с первого взгляда, пока не встретил тебя. Ты изменила всё.",
        },
        {
          e: "🍓",
          t: "Ты такая сладкая, что рядом с тобой я забываю обо всём на свете.",
        },
        {
          e: "🌷",
          t: "Ты — моё любимое место на земле. С тобой я дома, где бы мы ни были.",
        },
      ];

      let count = 0;
      let lastIdx = -1;
      let rafId = null;
      let outerAngle = 0;
      let innerAngle = 0;

      const outerIds = ["o1", "o2", "o3", "o4", "o5", "o6", "o7", "o8", "o9"];
      const innerIds = ["i1", "i2", "i3", "i4", "i5", "i6", "i7", "i8"];

      // ------------------- ФУНКЦИЯ ДЛЯ ЛОКАЛЬНЫХ ФОТО (универсальная) -------------------
      // Чтобы удобно вставлять фото, предлагаем функцию setPhoto(elementId, imagePath)
      // Пример: setPhoto('o1', 'images/my_photo.jpg');
      // Если передумали — можно вернуть эмодзи через removeImg(elementId)
      window.setPhoto = function (slotId, imageUrl) {
        const slot = document.getElementById(slotId);
        if (!slot) return;
        // очищаем содержимое слота
        slot.innerHTML = "";
        const img = document.createElement("img");
        img.src = imageUrl;
        img.alt = "фото";
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "cover";
        // обработка ошибки: если фото не загружается (неправильная ссылка), показываем заглушку 📸
        img.onerror = () => {
          slot.innerHTML = '<span style="font-size:20px">📸</span>';
          console.warn(`Фото не загрузилось по ссылке: ${imageUrl}`);
        };
        slot.appendChild(img);
      };

      // вспомогательная функция, если нужно вернуть эмодзи-заглушку
      window.resetPhotoToEmoji = function (slotId) {
        const slot = document.getElementById(slotId);
        if (slot) slot.innerHTML = "<span>📸</span>";
      };


  setPhoto('o1', 'images/1.jpg');
  setPhoto('o2', 'images/2.jpg');
  setPhoto('o3', 'images/3');
  setPhoto('o4', 'images/4.jpg');
  setPhoto('o5', 'images/5.jpg');
  setPhoto('o6', 'images/6.jpg');
  setPhoto('o7', 'images/7.jpg');
  setPhoto('o8', 'images/8.jpg');
  setPhoto('o9', 'images/9.jpg');




  setPhoto('i1', 'images/10.jpg');
  setPhoto('i2', 'images/11.jpg');
  setPhoto('i3', 'images/12.jpg');
  setPhoto('i4', 'images/13.jpg');
  setPhoto('i5', 'images/14.jpg');
  setPhoto('i6', 'images/15.jpg');
  setPhoto('i7', 'images/16.jpg');
  setPhoto('i8', 'images/17.jpg');


      // ---------- РАССТАНОВКА ФОТО ПО ОРБИТАМ ----------
      function layoutPhotos() {
        const area = document.getElementById("orbit-area");
        if (!area) return;
        const D = area.offsetWidth;
        if (D === 0) return;
        const R = D / 2;

        // внешний круг: размер чуть крупнее, радиус 78% от R (чтобы красиво влезало)
        const outerSize = Math.round(R * 0.32);
        const outerRadius = R * 0.78;
        outerIds.forEach((id, i) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.style.width = outerSize + "px";
          el.style.height = outerSize + "px";
          const angle =
            ((2 * Math.PI) / outerIds.length) * i - Math.PI / 2 + outerAngle;
          const left = R + outerRadius * Math.cos(angle) - outerSize / 2;
          const top = R + outerRadius * Math.sin(angle) - outerSize / 2;
          el.style.left = left + "px";
          el.style.top = top + "px";
        });

        // внутренний круг: 5 фото, чуть меньше
        const innerSize = Math.round(R * 0.24);
        const innerRadius = R * 0.52;
        innerIds.forEach((id, i) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.style.width = innerSize + "px";
          el.style.height = innerSize + "px";
          const angle =
            ((2 * Math.PI) / innerIds.length) * i - Math.PI / 2 + innerAngle;
          const left = R + innerRadius * Math.cos(angle) - innerSize / 2;
          const top = R + innerRadius * Math.sin(angle) - innerSize / 2;
          el.style.left = left + "px";
          el.style.top = top + "px";
        });
      }

      function animationLoop() {
        outerAngle += 0.0028; // плавное вращение внешних фото
        innerAngle -= 0.0022; // внутренние чуть против часовой
        layoutPhotos();
        rafId = requestAnimationFrame(animationLoop);
      }

      function startAnimations() {
        if (rafId) cancelAnimationFrame(rafId);
        layoutPhotos();
        animationLoop();
      }

      // Отслеживание ресайза и начальная подгонка
      let resizeTimer;
      window.addEventListener("resize", () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          layoutPhotos();
        }, 100);
      });

      window.addEventListener("load", () => {
        startAnimations();
        // дополнительно: еще раз подстроить размеры если анимация изменила родителя
        setTimeout(() => layoutPhotos(), 60);
      });

      // ----- лепестки / sparkles -----
      function spawnPetals() {
        const petalEmojis = ["🌸", "🌺", "💗", "✨", "🌹", "💕", "🌼", "🫧"];
        for (let i = 0; i < 10; i++) {
          setTimeout(() => {
            const petal = document.createElement("div");
            petal.className = "petal";
            petal.textContent =
              petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
            const size = 14 + Math.random() * 16;
            const duration = 2.8 + Math.random() * 3.2;
            const leftPos = Math.random() * 100;
            petal.style.cssText = `left: ${leftPos}%; top: -30px; font-size: ${size}px; animation-duration: ${duration}s; opacity: 0.9; filter: drop-shadow(0 0 2px pink);`;
            document.getElementById("petals").appendChild(petal);
            setTimeout(() => petal.remove(), duration * 1000);
          }, i * 120);
        }
      }

      // ----- показ комплимента (нажатие сердечка) -----
      function showCompliment() {
        count++;
        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * compliments.length);
        } while (newIndex === lastIdx && compliments.length > 1);
        lastIdx = newIndex;
        const comp = compliments[newIndex];
        const cardElem = document.getElementById("card");
        const emojiSpan = document.getElementById("cemoji");
        const textSpan = document.getElementById("ctext");
        const counterSpan = document.getElementById("counter");
        const numSpan = document.getElementById("cnum");

        emojiSpan.textContent = comp.e;
        textSpan.textContent = comp.t;

        // анимация появления карточки
        cardElem.style.display = "none";
        void cardElem.offsetWidth; // reflow
        cardElem.style.display = "block";
        cardElem.style.animation = "none";
        void cardElem.offsetWidth;
        cardElem.style.animation =
          "popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards";

        counterSpan.style.display = "block";
        numSpan.textContent = count;

        // запускаем эффект лепестков
        spawnPetals();

        // дополнительно маленькая вибрация на касании (если поддерживается)
        if (window.navigator && window.navigator.vibrate) {
          window.navigator.vibrate(40);
        }
      }

      // делаем функцию глобальной для кнопки
      window.showCompliment = showCompliment;

      // если нужно предустановить фото через data-атрибуты? дополнительно подготовим удобную инициализацию
      // также выполним проверку: если в слоте есть заглушка и разработчик добавит позже — ок
      console.log(
        'Готово! Для вставки локальных фото используйте: setPhoto("o1", "путь/фото.jpg")',
      );
    </script>
